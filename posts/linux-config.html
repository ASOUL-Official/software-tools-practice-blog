      <p class="eyebrow">Linux Config</p>
      <h1>Linux 环境配置</h1>
      <p>本阶段目标是在 Ubuntu 虚拟机中完成基础系统配置，包括静态 IP、主机名、用户权限和环境变量。</p>
      <h2>关键配置</h2>
      <p>建议使用 NAT + Host-Only 双网卡；创建 `dev` 用户并加入 sudo 组；在 `.bashrc` 中配置常用 alias 和自定义 PATH。</p>
      <h2>建议截图</h2>
      <p>截图应包含 `ip addr`、`hostnamectl`、`groups dev`、`echo $PATH` 和权限演示命令结果。</p>
